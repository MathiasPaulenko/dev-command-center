name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          # Matches from ## [VERSION] until the next ## [
          awk -v ver="$VERSION" '
            BEGIN { found=0; buffer="" }
            /^## \[/ {
              if (found) { exit }
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found {
              # Skip empty line right after header
              if (buffer == "" && $0 == "") { next }
              buffer = buffer $0 "\n"
            }
          ' CHANGELOG.md > release_notes.md

          # Check if we got anything
          if [ ! -s release_notes.md ]; then
            echo "No changelog section found for version $VERSION"
            echo "body=No release notes provided." >> "$GITHUB_OUTPUT"
          else
            # Write multiline output properly for GitHub Actions
            {
              echo 'body<<EOF'
              cat release_notes.md
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: DevCommandCenter ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
