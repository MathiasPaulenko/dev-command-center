name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            suffix: .exe
            artifact_name: DevCommandCenter-windows.exe
          - os: ubuntu-latest
            suffix: ""
            artifact_name: DevCommandCenter-linux
          - os: macos-latest
            suffix: ""
            artifact_name: DevCommandCenter-macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: bash
        run: |
          pyinstaller \
            --name DevCommandCenter \
            --onefile \
            --windowed \
            --hidden-import sqlalchemy.ext.baked \
            --hidden-import sqlalchemy.sql.default_comparator \
            main.py

      - name: Rename artifact
        shell: bash
        run: |
          src="dist/DevCommandCenter${{ matrix.suffix }}"
          dest="dist/${{ matrix.artifact_name }}"
          mv "$src" "$dest"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          gh release create "$tag" artifacts/**/* \
            --title "DevCommandCenter $tag" \
            --generate-notes
