<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4493f8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Outer rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96"
        fill="url(#bg)" stroke="#30363d" stroke-width="8"/>

  <!-- Subtle inner glow ring -->
  <rect x="48" y="48" width="416" height="416" rx="80" ry="80"
        fill="none" stroke="#4493f8" stroke-width="2" opacity="0.15"/>

  <!-- Title-bar dots (macOS style) -->
  <circle cx="104" cy="96" r="14" fill="#ff7b72"/>
  <circle cx="152" cy="96" r="14" fill="#d29922"/>
  <circle cx="200" cy="96" r="14" fill="#3fb950"/>

  <!-- Terminal prompt -->
  <g filter="url(#glow)">
    <text x="256" y="310" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace"
          font-size="180" font-weight="700" fill="#4493f8"
          text-anchor="middle" dominant-baseline="middle">&gt;_</text>
  </g>

  <!-- Cursor blink line -->
  <rect x="332" y="234" width="12" height="100" rx="4" fill="#3fb950" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
